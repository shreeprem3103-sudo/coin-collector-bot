name: Mobile App Automation Bot

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 * * * *' 

jobs:
  run-bot:
    runs-on: macos-14
    
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Automation Tools
      run: |
        pip install Appium-Python-Client selenium
        npm install -g appium
        appium driver install uiautomator2

    - name: Launch Android Cloud Emulator & Run Bot
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 30
        target: default  # Using the default barebones Android image instead of heavy Google APIs
        arch: arm64-v8a
        force-avd-creation: true
        emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
        disable-animations: true
        script: |
          # Wake up Appium control server
          appium --log appium.log &
          sleep 5 
          
          # Force check that the device is online before handing over to python
          adb wait-for-device
          
          # Execute the core bot script
          python bot31.py
